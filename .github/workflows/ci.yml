name: CI/CD Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    name: Validate & Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x' # Wersja LTS (działa z Angular 17+)
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Szybsze i bezpieczniejsze niż npm install dla CI

      - name: Check Code Quality (Lint)
        run: npm run lint

      - name: Run Unit Tests (Vitest)
        run: npm run test:run

      - name: Install Playwright & Browsers
        run: npx playwright install --with-deps chromium

      - name: Run End-to-End Tests (Playwright)
        run: npm run test:e2e
