name: CI/CD Testing Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-and-test:
    name: Validate & Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x' # Wersja LTS (działa z Angular 17+)
          cache: 'npm'

      - name: Install Dependencies
        run: npm install # Zmiana z npm ci z uwagi na konflikt wersji nody/npm

      - name: Check Code Quality (Lint)
        run: npm run lint

      - name: Run Unit Tests (Vitest)
        run: npm run test:run

      - name: Install Playwright & Browsers
        run: npx playwright install --with-deps

      - name: Run End-to-End Tests (Playwright)
        run: npm run test:e2e

      - name: Trigger Vercel Production Deploy
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
