<header
  class="fixed inset-x-0 top-0 z-[100] bg-slate-950/90 backdrop-blur-xl border-b border-white/5 supports-[backdrop-filter]:bg-slate-950/60 transition-all duration-300"
>
  <nav class="layout-container flex items-center justify-between py-5" aria-label="Global">
    <!-- Logo -->
    <div class="flex xl:flex-1">
      <app-brand-logo></app-brand-logo>
    </div>

    <!-- Mobile Menu Button -->
    <div class="flex xl:hidden">
      <button
        type="button"
        class="-m-2.5 inline-flex items-center justify-center rounded-sm p-2.5 text-slate-400 hover:text-white hover:bg-white/5 transition-all border border-transparent hover:border-white/10 group"
        (click)="toggleMobileMenu()"
      >
        <span class="sr-only">Otwórz menu</span>
        <div class="flex flex-col gap-1.5 w-6">
          <span class="h-0.5 w-full bg-current group-hover:w-3/4 transition-all ml-auto"></span>
          <span class="h-0.5 w-full bg-current"></span>
          <span class="h-0.5 w-full bg-current group-hover:w-1/2 transition-all ml-auto"></span>
        </div>
      </button>
    </div>

    <!-- Desktop Nav -->
    <div class="hidden xl:flex xl:gap-x-2">
      @for (item of navigation; track item.name; let index = $index) {
        @if (item.children) {
          <div class="relative group/dropdown">
            <button
              (click)="toggleDropdown(item.name)"
              class="relative px-4 py-2 text-[10px] font-extrabold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors group rounded-sm cursor-pointer flex items-center gap-2"
            >
              <span class="relative z-10 flex items-center gap-2">
                {{ item.name }}
                <svg
                  class="w-3 h-3 text-slate-500 group-hover:text-primary transition-transform duration-200"
                  [class.rotate-180]="openDropdown() === item.name"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M19 9l-7 7-7-7"
                  />
                </svg>
              </span>
            </button>

            <!-- Dropdown Menu -->
            @if (openDropdown() === item.name) {
              <div
                class="absolute top-full left-0 w-48 bg-slate-900 border border-slate-800 shadow-2xl py-2 mt-1 z-50 animate-in fade-in slide-in-from-top-2 duration-200"
              >
                @for (child of item.children; track child.name) {
                  <a
                    [routerLink]="child.path"
                    [fragment]="child.fragment"
                    (click)="closeDropdown()"
                    class="block px-4 py-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white hover:bg-slate-800 transition-colors"
                  >
                    {{ child.name }}
                  </a>
                }
              </div>
            }
          </div>
        } @else {
          <a
            [routerLink]="item.path"
            [fragment]="item.fragment"
            class="relative px-4 py-2 text-[10px] font-extrabold uppercase tracking-widest text-slate-400 hover:text-primary transition-colors group rounded-sm cursor-pointer"
          >
            {{ item.name }}
          </a>
        }
      }
    </div>

    <!-- Desktop CTA -->
    <div class="hidden xl:flex xl:flex-1 xl:justify-end">
      <app-button
        href="/#contact"
        variant="primary"
        size="sm"
        styleClass="text-[10px] font-black uppercase tracking-widest"
      >
        Bezpłatna Konsultacja
      </app-button>
    </div>
  </nav>
</header>
<!-- Mobile Menu -->
@if (mobileMenuOpen()) {
  <app-mobile-menu [navigation]="navigation" (closeMenu)="closeMobileMenu()"></app-mobile-menu>
}
