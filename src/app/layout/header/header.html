<header
  class="fixed inset-x-0 top-0 z-[100] bg-white border-b-2 border-secondary/10 transition-all duration-300"
  [class.py-1]="scrolled()"
>
  <nav class="layout-container flex items-center justify-between py-4" aria-label="Global">
    <!-- Logo -->
    <div class="flex xl:flex-1 shrink-0">
      <app-brand-logo></app-brand-logo>
    </div>

    <!-- Mobile Menu Button -->
    <div class="flex lg:hidden">
      <button
        type="button"
        class="inline-flex items-center justify-center p-3 text-secondary hover:text-primary hover:bg-neutral transition-all border-2 border-transparent hover:border-secondary/10 group rounded-none"
        (click)="toggleMobileMenu()"
      >
        <span class="sr-only">Otwórz menu</span>
        <div class="flex flex-col gap-1.5 w-6">
          <span class="h-0.5 w-full bg-current group-hover:w-3/4 transition-all ml-auto"></span>
          <span class="h-0.5 w-full bg-current"></span>
          <span class="h-0.5 w-full bg-current group-hover:w-1/2 transition-all ml-auto"></span>
        </div>
      </button>
    </div>

    <!-- Desktop Nav (Flat Structure) -->
    <div class="hidden lg:flex lg:items-center lg:gap-x-1 xl:gap-x-2">
      @for (item of navigation; track item.name; let index = $index) {
        <a
          [routerLink]="item.path"
          [fragment]="item.fragment"
          class="relative px-3 xl:px-5 py-2 font-mono text-[11px] xl:text-[12px] font-black uppercase tracking-widest text-secondary/60 hover:text-primary transition-all group cursor-pointer flex items-center"
        >
          <span
            class="hidden xl:inline text-secondary/10 mr-2 group-hover:text-primary/30 transition-colors"
            >0{{ index + 1 }}</span
          >
          {{ item.name }}
          <span
            class="absolute bottom-0 left-3 xl:left-5 right-3 xl:right-5 h-0.5 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform origin-left"
          ></span>
        </a>
      }
    </div>

    <!-- Desktop CTA -->
    <div class="hidden lg:flex lg:flex-1 lg:justify-end shrink-0">
      <app-button
        href="/consultation"
        variant="primary"
        size="sm"
        styleClass="text-[11px] font-black uppercase tracking-widest"
      >
        BEZPŁATNA KONSULTACJA
      </app-button>
    </div>
  </nav>
</header>

<!-- Mobile Menu -->
@if (mobileMenuOpen()) {
  <app-mobile-menu [navigation]="navigation" (closeMenu)="closeMobileMenu()"></app-mobile-menu>
}
