<section
  class="section-padding relative isolate overflow-hidden bg-slate-900 border-t border-white/10"
>
  <div class="layout-container relative z-10">
    <div
      class="mx-auto max-w-4xl bg-slate-950 border border-slate-800 p-8 sm:p-16 text-center relative overflow-hidden shadow-2xl"
    >
      <div class="relative z-20">
        <div
          class="inline-flex items-center gap-2 px-4 py-1.5 bg-primary/10 text-primary border border-primary/20 rounded-full text-[10px] font-black uppercase tracking-widest mb-10"
        >
          <span class="relative flex h-2.5 w-2.5">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-primary"></span>
          </span>
          GOTOWY NA ZMIANĘ?
        </div>

        <h2
          class="text-4xl sm:text-5xl font-extrabold text-white mb-8 uppercase tracking-tighter leading-tight"
        >
          Odzyskaj kontrolę nad <br /><span class="text-primary underline decoration-primary/30 underline-offset-8">swoją firmą</span>
        </h2>

        <p class="text-slate-400 text-lg leading-relaxed max-w-2xl mx-auto mb-12 font-light">
          Przestań marnować czas na szukanie kartek i odbieranie tych samych telefonów. 
          Skup się na swojej pracy, a technologię zostaw mi. Zbudujmy coś, co ułatwi Ci życie.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
          <app-button
            href="/#contact"
            variant="accent"
            size="lg"
            styleClass="w-full sm:w-auto uppercase tracking-widest text-xs font-black"
          >
            Sprawdź, jak możemy Ci pomóc
          </app-button>
        </div>
      </div>

      <!-- Decorative background element -->
      <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-primary/5 blur-3xl rounded-full"></div>
      <div class="absolute -top-24 -left-24 w-64 h-64 bg-primary/5 blur-3xl rounded-full"></div>
    </div>
  </div>

  <!-- Background Glow -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 blur-[120px] rounded-full -z-10"
  ></div>
</section>
