<section
  class="section-padding relative isolate overflow-hidden bg-neutral border-t-2 border-secondary/10 shadow-none"
>
  <div class="mx-auto max-w-7xl px-6 lg:px-8 relative z-10">
    <div
      class="mx-auto grid max-w-2xl grid-cols-1 items-center gap-x-8 gap-y-12 lg:mx-0 lg:max-w-none lg:grid-cols-2"
    >
      <!-- Image Column -->
      <div class="relative order-2 lg:order-1">
        <div
          class="relative aspect-square bg-white border-2 border-secondary/10 p-2 lg:max-w-sm ml-auto mr-auto lg:ml-0 group shadow-none"
        >
          <img
            class="absolute inset-2 h-[calc(100%-1rem)] w-[calc(100%-1rem)] object-cover filter grayscale contrast-110 group-hover:grayscale-0 transition-all duration-700"
            [ngSrc]="founder().image"
            alt="Karol Modelski - Twórca systemów warsztatowych na własność"
            width="400"
            height="400"
          />
        </div>
      </div>

      <!-- Text Column -->
      <div class="lg:pr-4 order-1 lg:order-2">
        <div class="relative lg:max-w-lg">
          <div class="animate-in fade-in slide-in-from-right-4 duration-700">
            <div class="mb-6 flex">
              <div class="status-badge status-badge-dark ring-4 ring-secondary/5 uppercase">
                O twórcy
              </div>
            </div>
            <h2 class="heading-2 text-secondary mb-6 !text-3xl lg:!text-4xl">
              {{ founder().headline }}
            </h2>

            <div class="text-body text-secondary/85 mb-8">
              @for (paragraph of founder().bio; track $index) {
                <p class="mb-4 last:mb-0" [innerHTML]="paragraph"></p>
              }
            </div>

            <div class="flex flex-wrap items-center gap-6">
              <a
                href="/o-mnie"
                class="group flex items-center gap-2 text-xs font-black uppercase tracking-[0.2em] text-secondary hover:text-primary transition-colors py-2"
              >
                Poznaj moją historię
                <lucide-icon
                  [img]="icons.ChevronRight"
                  size="14"
                  class="group-hover:translate-x-1 transition-transform"
                ></lucide-icon>
              </a>

              <div class="h-1 w-1 rounded-full bg-secondary/20 hidden sm:block"></div>

              <div class="flex flex-wrap gap-2">
                @for (badge of founder().badges; track $index) {
                  <span
                    class="text-[10px] font-mono font-bold uppercase tracking-widest text-secondary/40"
                  >
                    #{{ badge }}
                  </span>
                }
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
