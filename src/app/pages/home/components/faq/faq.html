<section
  class="section-padding relative isolate overflow-hidden bg-slate-900/20 border-t border-white/5"
>
  <div class="layout-container">
    <div class="lg:grid lg:grid-cols-12 lg:gap-12">
      <!-- Header Section -->
      <div class="lg:col-span-4 lg:sticky lg:top-32 self-start text-center lg:text-left mb-16 lg:mb-0">
        <app-section-header
          alignment="left"
          subtitle="BAZA WIEDZY"
          title="Częste pytania"
        >
          <p class="mt-6 text-base leading-7 text-slate-500">
            Masz dodatkowe pytania?
            <br />
            <a
              href="mailto:contact@scale-sail.io"
              class="font-bold text-primary hover:text-white transition-colors underline decoration-primary/30 underline-offset-8"
              >Napisz bezpośrednio do mnie</a
            >
          </p>
        </app-section-header>
      </div>

      <!-- FAQ Items -->
      <div class="lg:col-span-8">
        <ul class="space-y-4 list-none p-0">
          @for (faq of faqs(); track faq.question; let index = $index) {
            <li class="animate-in fade-in slide-in-from-bottom-2 duration-500" [style.delay.ms]="index * 100">
              <div
                class="group bg-slate-900/40 border border-slate-800 hover:border-slate-700 transition-all duration-300"
              >
                <div class="p-8">
                  <div class="flex items-start gap-6">
                    <span class="flex-shrink-0 text-xs font-bold text-primary/40 mt-1">
                      0{{ index + 1 }}
                    </span>
                    <div class="flex-grow">
                      <h3 class="text-lg font-bold text-white mb-4 group-hover:text-primary transition-colors">
                        {{ faq.question }}
                      </h3>
                      <div class="text-base text-slate-400 leading-relaxed font-light">
                        {{ faq.answer }}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
