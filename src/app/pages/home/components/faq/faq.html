<section
  class="section-padding relative isolate overflow-hidden bg-neutral/20 border-t-2 border-secondary/10 shadow-none"
>
  <div class="layout-container">
    <div class="lg:grid lg:grid-cols-12 lg:gap-12">
      <!-- Header Section -->
      <div
        class="lg:col-span-4 lg:sticky lg:top-32 self-start text-center lg:text-left mb-16 lg:mb-0"
      >
        <app-section-header
          alignment="left"
          subtitle="BAZA WIEDZY"
          title="Program dla warsztatu i usług"
        >
          <p class="mt-6 text-body text-secondary/50">
            Masz dodatkowe pytania?
            <br />
            <a
              href="mailto:contact@scale-sail.io"
              class="font-black text-primary hover:text-secondary transition-colors underline decoration-primary/30 underline-offset-8"
              >Napisz bezpośrednio do mnie</a
            >
          </p>
        </app-section-header>
      </div>

      <!-- FAQ Items -->
      <div class="lg:col-span-8">
        <ul class="space-y-4 list-none p-0">
          @for (faq of faqs(); track faq.question; let index = $index) {
            <li
              class="animate-in fade-in slide-in-from-bottom-2 duration-500"
              [style.delay.ms]="index * 100"
            >
              <div
                class="card-workshop group bg-white border-2 border-secondary/10 shadow-none hover:border-primary/40 transition-all duration-300"
              >
                <div class="p-8">
                  <div class="flex items-start gap-6">
                    <span class="flex-shrink-0 text-small text-primary/40 mt-1">
                      0{{ index + 1 }}
                    </span>
                    <div class="flex-grow">
                      <h3
                        class="heading-3 text-secondary mb-4 group-hover:text-primary transition-colors"
                      >
                        {{ faq.question }}
                      </h3>
                      <div class="text-body text-secondary/70" [innerHTML]="faq.answer"></div>
                    </div>
                  </div>
                </div>
              </div>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</section>
