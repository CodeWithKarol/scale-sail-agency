<section
  class="section-padding relative isolate overflow-hidden bg-neutral border-t-2 border-secondary/10 shadow-none"
>
  <div class="absolute inset-0 -z-10 bg-grid-workshop opacity-50"></div>
  <div class="absolute inset-0 -z-10 bg-noise pointer-events-none"></div>

  <div class="layout-container relative z-10">
    <app-section-header
      subtitle="PROFIL KLIENTA"
      title="Dla kogo buduję te systemy?"
      description="Nie każda firma potrzebuje dedykowanego systemu. Skupiam się na miejscach, gdzie technologia realnie przekłada się na oszczędność czasu i spokój właściciela."
    />

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 lg:items-stretch">
      <!-- Ideal Profile -->
      <app-card [variant]="'highlight'" class="h-full">
        <div
          class="p-6 sm:p-8 flex flex-col h-full bg-white group hover:bg-neutral/30 transition-colors"
        >
          <div class="flex items-center gap-4 mb-6 border-b-2 border-secondary/10 pb-4">
            <h3 class="status-badge status-badge-dark ring-2 ring-primary/20 inline-flex">
              IDEALNY PROFIL
            </h3>
          </div>

          <ul class="space-y-4 flex-1">
            @for (item of idealClients(); track item) {
              <li class="flex gap-3 items-center group/item">
                <lucide-icon [img]="icons.Check" size="16" class="text-primary"></lucide-icon>
                <span
                  class="text-base font-medium text-secondary/80 leading-tight group-hover/item:text-secondary transition-colors"
                >
                  {{ item }}
                </span>
              </li>
            }
          </ul>
        </div>
      </app-card>

      <!-- Outside Scope -->
      <app-card [variant]="'default'" class="h-full opacity-90">
        <div class="p-6 sm:p-8 flex flex-col h-full bg-neutral/30 group">
          <div class="flex items-center gap-4 mb-6 border-b-2 border-secondary/10 pb-4 opacity-70">
            <h3 class="text-[10px] text-secondary/70 tracking-[0.2em] font-bold uppercase">
              Poza zakresem
            </h3>
          </div>

          <ul class="space-y-4 flex-1 opacity-80">
            @for (item of antiPatterns(); track item) {
              <li class="flex gap-3 items-center group/item">
                <lucide-icon [img]="icons.X" size="16" class="text-secondary/30"></lucide-icon>
                <span
                  class="text-sm text-secondary/70 leading-tight group-hover/item:text-secondary/90 transition-colors"
                >
                  {{ item }}
                </span>
              </li>
            }
          </ul>
        </div>
      </app-card>
    </div>
  </div>
</section>
