<section class="section-padding relative isolate overflow-hidden bg-slate-950 border-t border-white/5">
  <!-- Technical Grid Background -->
  <div class="absolute inset-0 -z-10 bg-grid-tech opacity-50"></div>

  <div class="layout-container relative z-10">
    <app-section-header
      subtitle="PROFIL KLIENTA"
      title="Z kim pracuję"
      description="Skupiam się na małych firmach usługowych, które na co dzień ogarniają wszystko na papierze, w zeszycie albo prostym Excelu. Jeśli Twoja firma działa lokalnie, masz powtarzalne zlecenia lub wizyty, a chaos w kalendarzu i papierach zaczyna Cię przerastać – prawdopodobnie mogę pomóc."
    />

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
      <!-- Compatible (Who it is for) -->
      <app-card
        class="relative overflow-hidden border border-primary/20 bg-slate-900/40 p-10 flex flex-col h-full group transition-all duration-300 hover:border-primary/40"
      >
        <!-- Header -->
        <div class="flex items-center gap-4 mb-10 border-b border-white/5 pb-8">
          <div
            class="flex items-center justify-center w-12 h-12 rounded-sm bg-primary/10 border border-primary/20 text-primary"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div>
            <div class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-primary/80 mb-1">
              IDEALNY PROFIL
            </div>
            <h3 class="text-2xl font-bold text-white">Dla kogo tak</h3>
          </div>
        </div>

        <!-- List -->
        <ul class="space-y-6 flex-1">
          @for (item of idealClients(); track item) {
            <li class="flex gap-4 items-start group/item">
              <span
                class="mt-2 w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_10px_rgba(0,102,255,0.5)] transition-transform group-hover/item:scale-125"
              ></span>
              <span
                class="text-base text-slate-300 leading-relaxed group-hover/item:text-white transition-colors"
              >
                {{ item }}
              </span>
            </li>
          }
        </ul>

        <!-- Status -->
        <div
          class="mt-12 pt-8 border-t border-white/5 flex items-center gap-3 text-xs font-bold text-primary uppercase tracking-widest"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
          </span>
          Wsparcie priorytetowe aktywne
        </div>
      </app-card>

      <!-- Incompatible (Who it is NOT for) -->
      <app-card
        class="relative overflow-hidden border border-white/5 bg-slate-900/20 p-10 flex flex-col h-full opacity-80 hover:opacity-100 transition-all duration-500"
      >
        <!-- Header -->
        <div class="flex items-center gap-4 mb-10 border-b border-white/5 pb-8">
          <div
            class="flex items-center justify-center w-12 h-12 rounded-sm bg-white/5 border border-white/10 text-slate-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
          <div>
            <div class="text-[10px] font-extrabold uppercase tracking-[0.2em] text-slate-500 mb-1">
              POZA ZAKRESEM
            </div>
            <h3 class="text-2xl font-bold text-slate-300">Dla kogo nie</h3>
          </div>
        </div>

        <!-- List -->
        <ul class="space-y-6 flex-1">
          @for (item of antiPatterns(); track item) {
            <li class="flex gap-4 items-start group/item">
              <span class="mt-2 w-1.5 h-1.5 rounded-full bg-slate-700 transition-transform group-hover/item:scale-125"></span>
              <span
                class="text-base text-slate-500 leading-relaxed group-hover/item:text-slate-400 transition-colors"
              >
                {{ item }}
              </span>
            </li>
          }
        </ul>

        <!-- Status -->
        <div
          class="mt-12 pt-8 border-t border-white/5 flex items-center gap-3 text-xs font-bold text-slate-600 uppercase tracking-widest"
        >
          <span class="w-2 h-2 rounded-full bg-slate-800"></span>
          Brak wolnych terminów
        </div>
      </app-card>
    </div>
  </div>
</section>
