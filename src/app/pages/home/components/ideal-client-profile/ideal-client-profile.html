<section
  class="section-padding relative isolate overflow-hidden bg-neutral border-t-2 border-secondary/10 shadow-none"
>
  <!-- Technical Grid Background & Noise -->
  <div class="absolute inset-0 -z-10 bg-grid-workshop opacity-50"></div>
  <div class="absolute inset-0 -z-10 bg-noise pointer-events-none"></div>

  <div class="layout-container relative z-10">
    <app-section-header
      subtitle="PROFIL KLIENTA"
      title="Z kim pracuję"
      description="Skupiam się na małych firmach usługowych, które na co dzień ogarniają wszystko na papierze, w zeszycie albo prostym Excelu. Jeśli Twoja firma działa lokalnie, masz powtarzalne zlecenia lub wizyty, a chaos w kalendarzu i papierach zaczyna Cię przerastać – prawdopodobnie mogę pomóc."
    />

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
      <!-- Compatible (Who it is for) -->
      <app-card class="card-workshop h-full flex flex-col p-10 group shadow-none">
        <!-- Header -->
        <div class="flex items-center gap-4 mb-10 border-b-2 border-secondary/10 pb-8">
          <div
            class="flex items-center justify-center w-12 h-12 rounded-none bg-neutral border-2 border-secondary/10 text-secondary"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div>
            <div
              class="font-mono text-[10px] font-extrabold uppercase tracking-[0.2em] text-primary mb-1"
            >
              IDEALNY PROFIL
            </div>
            <h3 class="heading-3 text-secondary">Dla kogo tak</h3>
          </div>
        </div>

        <!-- List -->
        <ul class="space-y-6 flex-1">
          @for (item of idealClients(); track item) {
            <li class="flex gap-4 items-start group/item">
              <span
                class="mt-2 w-1.5 h-1.5 rounded-full bg-primary/40 transition-all duration-300 group-hover/item:scale-150 group-hover/item:bg-accent group-hover/item:shadow-none flex-shrink-0"
              ></span>
              <span
                class="text-base text-secondary/70 leading-relaxed group-hover/item:text-secondary transition-colors"
              >
                {{ item }}
              </span>
            </li>
          }
        </ul>

        <!-- Status -->
        <div
          class="mt-12 pt-8 border-t-2 border-secondary/10 flex items-center gap-3 font-mono text-xs font-bold text-primary uppercase tracking-widest"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"
            ></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
          </span>
          Wsparcie priorytetowe aktywne
        </div>
      </app-card>

      <app-card class="card-workshop h-full flex flex-col p-10 shadow-none">
        <!-- Header -->
        <div class="flex items-center gap-4 mb-10 border-b-2 border-secondary/10 pb-8">
          <div
            class="flex items-center justify-center w-12 h-12 rounded-none bg-neutral border-2 border-secondary/10 text-secondary/50"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
          <div>
            <div
              class="font-mono text-[10px] font-extrabold uppercase tracking-[0.2em] text-secondary/50 mb-1"
            >
              POZA ZAKRESEM
            </div>
            <h3 class="heading-3 text-secondary/70">Dla kogo nie</h3>
          </div>
        </div>

        <!-- List -->
        <ul class="space-y-6 flex-1">
          @for (item of antiPatterns(); track item) {
            <li class="flex gap-4 items-start group/item">
              <span
                class="mt-2 w-1.5 h-1.5 rounded-full bg-secondary/40 transition-transform group-hover/item:scale-125 flex-shrink-0"
              ></span>
              <span
                class="text-base text-secondary/70 leading-relaxed group-hover/item:text-secondary/70 transition-colors"
              >
                {{ item }}
              </span>
            </li>
          }
        </ul>

        <!-- Status -->
        <div
          class="mt-12 pt-8 border-t-2 border-secondary/10 flex items-center gap-3 font-mono text-xs font-bold text-secondary/60 uppercase tracking-widest"
        >
          <span class="w-2 h-2 rounded-full bg-neutral"></span>
          Brak wolnych terminów
        </div>
      </app-card>
    </div>
  </div>
</section>
