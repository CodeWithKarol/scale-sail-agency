<section
  class="section-padding bg-neutral relative overflow-hidden border-t-2 border-secondary/10 shadow-none"
>
  <!-- Technical Background -->
  <div class="absolute inset-0 -z-10 bg-grid-tech opacity-30"></div>

  <div class="layout-container relative z-10">
    <app-section-header
      subtitle="ETAPY WSPÓŁPRACY"
      title="Wdrożenie systemu w Twojej firmie"
      description="Prosty i przejrzysty proces budowy Twojej aplikacji. Od pierwszej rozmowy po gotowy system, który ułatwia Ci codzienną pracę."
    />

    <div class="mx-auto mt-16 lg:mt-24">
      <div class="relative grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Connector Line (Desktop) -->
        <div class="hidden lg:block absolute top-1/2 left-0 w-full h-px bg-neutral -z-10"></div>

        <ol class="contents">
          @for (step of steps(); track step.number; let i = $index) {
            <li class="relative group h-full">
              <!-- Card Container -->
              <div
                class="card-workshop h-full bg-white border-2 border-secondary/10 shadow-none p-10 hover:border-primary transition-all duration-300 flex flex-col relative"
              >
                <!-- Header: Number & Status -->
                <div class="flex justify-between items-start mb-10">
                  <div class="flex flex-col gap-2">
                    <span
                      class="text-[10px] font-mono font-extrabold text-primary uppercase tracking-[0.3em]"
                      >KROK {{ step.number }}</span
                    >
                    <div class="flex items-center gap-2">
                      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                      <span
                        class="text-[10px] font-mono font-bold uppercase tracking-widest text-secondary/50"
                        >{{ step.status }}</span
                      >
                    </div>
                  </div>

                  <!-- Icon Box -->
                  <div
                    class="w-14 h-14 flex items-center justify-center bg-neutral border-2 border-secondary/10 text-secondary/70 group-hover:bg-primary group-hover:border-primary group-hover:text-secondary transition-all rounded-none"
                  >
                    <svg
                      class="w-7 h-7"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        [attr.d]="step.iconPath"
                      />
                    </svg>
                  </div>
                </div>

                <!-- Content -->
                <div class="flex-grow">
                  <div
                    class="text-[10px] font-mono font-bold text-secondary/50 mb-2 tracking-widest uppercase"
                  >
                    {{ step.subtitle }}
                  </div>
                  <h3
                    class="heading-3 text-secondary mb-4 group-hover:text-primary transition-colors"
                  >
                    {{ step.title }}
                  </h3>
                  <p class="text-base text-secondary/70 leading-relaxed font-normal">
                    {{ step.description }}
                  </p>
                </div>

                <!-- Footer: Duration -->
                <div
                  class="mt-10 pt-6 border-t-2 border-secondary/10 flex items-center justify-between text-[10px] font-mono font-bold text-secondary/50"
                >
                  <span class="tracking-widest uppercase">PRZEWIDYWANY CZAS:</span>
                  <span
                    class="text-secondary/70 bg-neutral px-2 py-1 rounded-none border-2 border-secondary/10 tracking-wider"
                    >{{ step.duration }}</span
                  >
                </div>
              </div>
            </li>
          }
        </ol>
      </div>
    </div>
  </div>
</section>
