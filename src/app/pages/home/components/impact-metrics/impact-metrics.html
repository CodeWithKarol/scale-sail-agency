<section class="section-padding relative isolate overflow-hidden mx-4 sm:mx-6 lg:mx-8 mt-8 z-20">
  <div class="layout-container relative z-10">
    <!-- Header -->
    <app-section-header
      subtitle="EFEKTY WSPÓŁPRACY"
      title="Mierzalne korzyści"
      description="Nowoczesna aplikacja to nie tylko wygoda, to przede wszystkim oszczędność czasu i lepszy wizerunek Twojej firmy. Oto co zazwyczaj udaje nam się osiągnąć."
    />

    <!-- Metrics Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (metric of metrics(); track metric.label; let index = $index) {
        <app-card
          [interactive]="true"
          class="group relative overflow-hidden bg-slate-900/40 border border-slate-800 p-10 flex flex-col items-center text-center transition-all duration-300 hover:border-primary hover:bg-slate-900/60"
        >
          <!-- Value -->
          <div class="relative mb-4">
            <span
              class="text-4xl md:text-5xl font-extrabold text-white group-hover:text-primary transition-colors tracking-tighter"
            >
              {{ metric.value }}
            </span>
            @if (metric.suffix) {
              <span
                class="absolute -top-2 -right-4 text-sm font-bold text-primary/80"
              >
                {{ metric.suffix }}
              </span>
            }
          </div>

          <!-- Label -->
          <h3
            class="text-xs font-extrabold uppercase tracking-[0.2em] text-slate-400 mb-4 group-hover:text-white transition-colors"
          >
            {{ metric.label }}
          </h3>

          <!-- Description -->
          <p
            class="text-sm text-slate-500 leading-relaxed max-w-[220px] group-hover:text-slate-300 transition-colors font-light"
          >
            {{ metric.description }}
          </p>
        </app-card>
      }
    </div>
  </div>
</section>
