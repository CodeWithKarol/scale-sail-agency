<section
  class="section-padding relative isolate overflow-hidden mx-4 sm:mx-6 lg:mx-8 mt-8 z-20 border-t-2 border-secondary/10"
>
  <div class="layout-container relative z-10">
    <!-- Header -->
    <app-section-header
      subtitle="EFEKTY WSPÓŁPRACY"
      title="Mierzalne korzyści"
      description="Nowoczesna aplikacja to nie tylko wygoda, to przede wszystkim oszczędność czasu i lepszy wizerunek Twojej firmy. Oto co zazwyczaj udaje nam się osiągnąć."
    />

    <!-- Metrics Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (metric of metrics(); track metric.label; let index = $index) {
        <app-card
          [interactive]="true"
          class="card-workshop group relative overflow-hidden p-10 flex flex-col items-center text-center shadow-none"
        >
          <!-- Value -->
          <div class="relative mb-4">
            <span class="heading-2 text-secondary group-hover:text-primary transition-colors">
              {{ metric.value }}
            </span>
            @if (metric.suffix) {
              <span class="absolute -top-2 -right-4 text-small text-primary/80">
                {{ metric.suffix }}
              </span>
            }
          </div>

          <!-- Label -->
          <h3
            class="text-small text-secondary/70 mb-4 group-hover:text-secondary transition-colors"
          >
            {{ metric.label }}
          </h3>

          <!-- Description -->
          <p
            class="text-body max-w-[220px] mx-auto text-secondary/70 group-hover:text-secondary transition-colors"
          >
            {{ metric.description }}
          </p>
        </app-card>
      }
    </div>

    <!-- Disclaimer -->
    <div class="mt-12 text-center">
      <p class="text-small text-secondary/30">
        *wartości orientacyjne, zależne od specyfiki Twojej firmy
      </p>
    </div>
  </div>
</section>
